app:
  max_text_length: 1023
  simhash_bits: 64
  scoring_max: 999
  schema_version: 1
  require_captcha: false

websocket:
  host: 127.0.0.1
  port: 8765

redis:
  enabled: true
  url: redis://localhost:6379/0
  similarity_index_key: solidocto:lsh
  entry_key_prefix: solidocto:entry
  fallback_bucket_key: solidocto:simhashes

fuzz:
  enabled: false
  max_jitter: 3
  bucket_hours: 24

features:
  redisbloom_enabled: true
  fallback_similarity_enabled: true
