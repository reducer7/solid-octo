garbage:
  entropy:
    terminal_gt: 5.0
    low_lt: 3.0
    low_add_human: 10
    mid_add_human: 1
    mid_add_ai: 1
  repeated_char_density:
    warning_gt: 0.15
    warning_add_garbage: 20
    terminal_gt: 0.25
    terminal_score: 999
  non_printable_density:
    warning_gt: 0.02
    warning_add_garbage: 20
    terminal_gt: 0.05
    terminal_score: 999
  unicode_outliers:
    other_gt: 0.20
    punct_gt: 0.20
    symbol_gt: 0.20
    number_gt: 0.50
    terminal_score: 999
  word_salad:
    dictionary_path: backend/tests/garbage/common_words_5k.txt
    ignore_proper_nouns: true           #true = don't include capitalized words in the dictionary matching
    uncommon_warning_gt: 0.30
    warning_add_garbage: 100
    uncommon_terminal_gt: 0.85
    terminal_score: 999
    token_pattern: "[A-Za-z']+"
  line_length_variance:
    min_lines: 3
    low_lt: 2.0
    low_add_ai: 1
    low_add_garbage: 1
    mid_gt: 3.0
    mid_lt: 9.0
    mid_add_ai: 1
    mid_add_human: 1
    high_gt: 9.0
    high_add_garbage: 1
  bigram:
    bigram_path: backend/tests/garbage/bigrams.json
    low_lt: 0.1
    low_add_ai: 1
    low_add_human: 1
    mid1_gt: 0.2
    mid1_add_garbage: 1
    mid1_add_ai: 2
    mid2_gt: 0.3
    mid2_add_garbage: 2
    mid2_add_ai: 3
    high_gt: 0.6
    high_add_garbage: 10
    terminal_gt: 1.0
    terminal_score: 999
